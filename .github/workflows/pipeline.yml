name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Docker Image
        run: |
          docker build -t shivamyadav2005/devsecops-app:latest .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'shivamyadav2005/devsecops-app:latest'
          format: 'table'
          exit-code: '0'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to Docker Hub
        run: |
          docker push shivamyadav2005/devsecops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull shivamyadav2005/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d \
              --name devsecops-app \
              -p 5000:5000 \
              shivamyadav2005/devsecops-app:latest
